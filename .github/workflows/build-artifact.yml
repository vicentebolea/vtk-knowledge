name: Build Knowledge Artifact

on:
  workflow_dispatch:
    inputs:
      model:
        description: "LiteLLM model identifier (e.g. openai/gpt-4o, anthropic/claude-3-5-sonnet-20241022)"
        required: true
        default: "openai/gpt-4o"
      vtk_version:
        description: "VTK version tag override (leave empty to auto-detect from installed VTK)"
        required: false
        default: ""

jobs:
  build-artifact:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install build dependencies
        run: uv sync --extra build

      - name: Build knowledge artifact
        env:
          MODEL: ${{ inputs.model }}
          VTK_VERSION: ${{ inputs.vtk_version }}
          OPENAI_API_KEY: ${{ secrets.LLM_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          extra_args=()
          if [ -n "$VTK_VERSION" ]; then
            extra_args+=(--vtk-version "$VTK_VERSION")
          fi
          uv run vtk-knowledge build \
            --model "$MODEL" \
            --output-dir artifacts/ \
            "${extra_args[@]}"

      - name: Determine image tag from artifact filename
        id: meta
        run: |
          file=$(find artifacts -name 'vtk-knowledge-*.jsonl' | head -1)
          version=$(basename "$file" .jsonl | sed 's/vtk-knowledge-//')
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "file=$file" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | podman login ghcr.io \
            --username "${{ github.actor }}" \
            --password-stdin

      - name: Build and push scratch image
        env:
          REPO: ${{ github.repository }}
          VERSION: ${{ steps.meta.outputs.version }}
          FILE: ${{ steps.meta.outputs.file }}
        run: |
          image="ghcr.io/$(echo "$REPO" | tr '[:upper:]' '[:lower:]')"
          printf 'FROM scratch\nCOPY %s /vtk-knowledge.jsonl\n' "$FILE" > Dockerfile.artifact
          podman build -f Dockerfile.artifact \
            -t "$image:$VERSION" \
            -t "$image:latest" \
            .
          podman push "$image:$VERSION"
          podman push "$image:latest"
